name: Hello

on:
  workflow_dispatch:

jobs:
  say-hello-bash:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Hello world!"

  say-hello-python:
    runs-on: ubuntu-24.04
    steps:
      - run: print("Hello world!")
        shell: python

  say-hello-action:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/hello-world-javascript-action@e76147da8e5c81eaf017dede5645551d4b94427b
        with:
          who-to-greet: "world"
